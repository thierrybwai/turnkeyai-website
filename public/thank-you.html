<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Received | TurnkeyAI</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d14;
      color: #fff;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      background: #12101f;
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 24px;
      padding: 64px 48px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 16px; }
    p { color: #a0a0b8; font-size: 17px; line-height: 1.6; margin-bottom: 12px; }
    .highlight { color: #7c3aed; font-weight: 700; }
    .btn {
      display: inline-block;
      margin-top: 32px;
      background: #7c3aed;
      color: #fff;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
    }
    .btn:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>You're on the list.</h1>
    <p>We've received your AI Audit request and will be in touch <span class="highlight">within 2 business hours.</span></p>
    <p>In the meantime, have a look at how we've helped other Australian businesses deploy AI in 7 days.</p>
    <a href="/" class="btn">← Back to TurnkeyAI</a>
  </div>
</body>
</html>
