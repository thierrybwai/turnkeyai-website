<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0a26;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="key" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b894ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c47ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Key icon centred in the square -->
  <!-- Key ring -->
  <circle cx="24" cy="28" r="11" fill="none" stroke="url(#key)" stroke-width="3" filter="url(#glow)"/>
  <!-- Key ring inner dot -->
  <circle cx="24" cy="28" r="4" fill="url(#key)"/>
  <!-- Key shaft -->
  <rect x="33" y="25.5" width="18" height="4.5" rx="2" fill="url(#key)"/>
  <!-- Key teeth -->
  <rect x="45" y="30" width="3.5" height="6" rx="1" fill="url(#key)"/>
  <rect x="38" y="30" width="3.5" height="4.5" rx="1" fill="url(#key)"/>

  <!-- Small circuit accent dots -->
  <circle cx="15" cy="19" r="1.5" fill="#9b72ff" opacity="0.6"/>
  <circle cx="33" cy="37" r="1" fill="#6c47ff" opacity="0.5"/>
  <line x1="15" y1="19" x2="23" y2="26" stroke="#9b72ff" stroke-width="0.7" opacity="0.4"/>
</svg>
